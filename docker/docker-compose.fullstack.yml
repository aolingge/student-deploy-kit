services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
