# Static website template.
# Replace example.com and /var/www/demo-web before use.

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    root /var/www/demo-web;
    index index.html;

    # SPA fallback for Vue/React Router. Remove this line for plain HTML sites.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    access_log /var/log/nginx/demo-web.access.log;
    error_log /var/log/nginx/demo-web.error.log;
}
